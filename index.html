<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Галактика | Молекулярное излучение</title>
    <link rel="stylesheet" href="./design.css">
</head>
<body>
    <div class="main-container">
        <!-- ВЕРХНИЙ СВЕТЛО-СЕРЫЙ ОВАЛ (ЗАГОЛОВОК) -->
        <div class="title-oval">
            <h1>3D visualization of galaxy Milky Way</h1>
        </div>

        <!-- ЧЕРНЫЙ ОВАЛ (ГАЛАКТИКА) -->
        <div class="galaxy-viewport">
            <div id="canvas-container"></div>
        </div>

        <!-- НИЖНЯЯ СТРОКА -->
        <div class="bottom-row">
            <!-- ФИЛЬТРЫ -->
            <div class="filter-panel">
                <div class="filter-title">🔘 Filters</div>

                <div class="filter-item">
                    <label class="switch">
                        <input type="checkbox" class="filter-checkbox" data-filter="co" checked>
                        <span class="slider"></span>
                    </label>
                    <span class="filter-label">CO</span>
                </div>

                <div class="filter-item">
                    <label class="switch">
                        <input type="checkbox" class="filter-checkbox" data-filter="oh" checked>
                        <span class="slider"></span>
                    </label>
                    <span class="filter-label">OH</span>
                </div>

                <div class="filter-item">
                    <label class="switch">
                        <input type="checkbox" class="filter-checkbox" data-filter="h2o" checked>
                        <span class="slider"></span>
                    </label>
                    <span class="filter-label">H₂O</span>
                </div>

                <div class="filter-item">
                    <label class="switch">
                        <input type="checkbox" class="filter-checkbox" data-filter="hco" checked>
                        <span class="slider"></span>
                    </label>
                    <span class="filter-label">HCO⁺</span>
                </div>
            </div>

            <!-- СВЕТЛО-СЕРЫЙ КОНТЕЙНЕР ДАННЫХ -->
            <div class="data-container">
                <!-- БЛОК С НАЗВАНИЕМ ОБЪЕКТА -->
                <div class="object-name-box" id="objectNameBox">
                    <span id="objectName">—</span>
                </div>

                <!-- ДВА БЛОКА В РЯД -->
                <div class="info-row">
                    <!-- КООРДИНАТЫ -->
                    <div class="coord-box" id="coordPanel">
                        <div class="panel-title">📡 Galaxy coordinates</div>
                        <div class="param-row">
                            <span class="param-label">longitude (l)</span>
                            <span class="param-value coord" id="coordL">—</span>
                        </div>
                        <div class="param-row">
                            <span class="param-label">latitude (b)</span>
                            <span class="param-value coord" id="coordB">—</span>
                        </div>
                        <div class="param-row">
                            <span class="param-label">distance (r)</span>
                            <span class="param-value distance" id="distanceR">—</span>
                        </div>
                    </div>

                    <!-- ИНТЕНСИВНОСТЬ, СКОРОСТЬ И ПЕРЕХОДЫ -->
                    <div class="intensity-velocity-box" id="intVelPanel">
                        <div class="panel-title">✨ Parameters</div>
                        <div class="param-row">
                            <span class="param-label">Intensity (I)</span>
                            <span class="param-value luminosity" id="luminosityL">—</span>
                        </div>
                        <div class="param-row">
                            <span class="param-label">Velocity (V)</span>
                            <span class="param-value velocity" id="velocityV">—</span>
                        </div>
                        <div class="param-row">
                            <span class="param-label">Transition(s)</span>
                            <span class="param-value transition" id="transitionValue">—</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ЛЕГЕНДА -->
            <div class="legend-panel">
                <div class="legend-title">⭐ Molecules</div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ff5533;"></div>
                    <span class="legend-name">CO</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #4488ff;"></div>
                    <span class="legend-name">OH</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ffcc44;"></div>
                    <span class="legend-name">H₂O</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #cceeff;"></div>
                    <span class="legend-name">HCO⁺</span>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
